services:
  db:
    image: postgres:16
    container_name: havok_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: havok
    ports:
      - "5432:5432"
    volumes:
      - havok_pgdata:/var/lib/postgresql/data

volumes:
  havok_pgdata:

