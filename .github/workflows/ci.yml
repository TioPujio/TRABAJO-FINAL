name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Opt into Node.js 24 runtime for JavaScript-based GitHub Actions (checkout/setup-node, etc.)
  # This avoids upcoming Node 20 deprecation warnings on runners.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend_new:
    name: Backend (backend_new) tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend_new
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: backend_new/package-lock.json
      - run: npm ci
      - run: npm test

  backend:
    name: Backend (backend) tests + coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run coverage

  frontend:
    name: Frontend lint + E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium
      - name: Run Playwright (Chromium)
        run: npx playwright test --project=chromium
